<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WorkPulse — Change Password</title>
  <link rel="icon" type="image/svg+xml" href="assets/images/logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/app.css">
  <style>
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: linear-gradient(160deg, var(--md-primary) 0%, var(--md-primary-dark) 55%, #1a237e 100%);
    }
    .login-card { width: 100%; max-width: 400px; box-shadow: var(--md-shadow-3); }
    .logo-row { display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 6px; }
    .logo-row .logo-img { width: 40px; height: 40px; filter: drop-shadow(0 2px 4px rgba(26,35,126,.3)); }
    .logo-row h1 { font-size: 24px; font-weight: 700; }
    .tagline { text-align: center; color: var(--md-text-2); font-size: 14px; margin-bottom: 28px; }
    .switch-link { text-align: center; margin-top: 20px; font-size: 14px; }
    .switch-link a { color: var(--md-primary); font-weight: 500; text-decoration: none; }
    .switch-link a:hover { text-decoration: underline; }
    .first-login-note {
      background: var(--md-primary-light);
      color: var(--md-primary-dark);
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="login-wrap">
    <div class="md-card login-card">
      <div class="logo-row">
        <img src="assets/images/logo.svg" alt="WorkPulse" class="logo-img">
        <h1>WorkPulse</h1>
      </div>
      <p class="tagline">Change your password</p>

      <div class="first-login-note" id="firstLoginNote">
        Pehli login hai — system wala password badal ke apna password set karo.
      </div>

      <form id="cpForm" novalidate>
        <div class="md-field" id="oldField">
          <input type="password" id="oldPassword" placeholder=" " autocomplete="current-password" required>
          <label for="oldPassword">Current Password</label>
          <div class="field-msg" id="oldMsg"></div>
        </div>

        <div class="md-field" id="newField">
          <input type="password" id="newPassword" placeholder=" " autocomplete="new-password" required>
          <label for="newPassword">New Password</label>
          <button type="button" class="toggle-eye" data-for="newPassword" tabindex="-1" aria-label="Show password">
            <span class="material-icons" style="font-size:20px">visibility</span>
          </button>
          <div class="field-msg" id="newMsg"></div>
        </div>

        <div class="md-field" id="confirmField">
          <input type="password" id="confirmPassword" placeholder=" " autocomplete="new-password" required>
          <label for="confirmPassword">Confirm New Password</label>
          <div class="field-msg" id="confirmMsg"></div>
        </div>

        <button type="submit" class="md-btn md-btn-primary md-btn-block" id="cpBtn">
          <span id="btnText">Change Password</span>
        </button>
      </form>

      <!-- pehli login pe ye nahi dikhta, password badalna zaroori hota hai -->
      <p class="switch-link" id="backLink" style="display:none">
        <a href="#" id="backBtn">&larr; Back to Dashboard</a>
      </p>
    </div>
  </div>

  <div class="md-snackbar" id="snackbar"></div>

  <script src="assets/js/api.js"></script>
  <script>
    const form = document.getElementById('cpForm');
    const btn = document.getElementById('cpBtn');
    const btnText = document.getElementById('btnText');
    const snackbar = document.getElementById('snackbar');
    let userRole = null;

    document.querySelectorAll('.toggle-eye').forEach(el => {
      el.addEventListener('click', () => {
        const input = document.getElementById(el.dataset.for);
        const icon = el.querySelector('.material-icons');
        const show = input.type === 'password';
        input.type = show ? 'text' : 'password';
        icon.textContent = show ? 'visibility_off' : 'visibility';
      });
    });

    let snackTimer;
    function toast(msg, isError = true) {
      clearTimeout(snackTimer);
      snackbar.textContent = msg;
      snackbar.className = 'md-snackbar show' + (isError ? ' error' : '');
      snackTimer = setTimeout(() => snackbar.classList.remove('show'), 4000);
    }

    function setFieldError(fieldId, msgId, msg) {
      document.getElementById(fieldId).classList.toggle('has-error', !!msg);
      document.getElementById(msgId).textContent = msg || '';
    }

    // typing shuru karte hi error hata do
    document.querySelectorAll('.md-field input').forEach(inp => {
      inp.addEventListener('input', () => {
        const field = inp.closest('.md-field');
        field.classList.remove('has-error');
        const msg = field.querySelector('.field-msg');
        if (msg) msg.textContent = '';
      });
    });

    function dashboardUrl() {
      return userRole === 'admin' ? 'admin/dashboard.html' : 'employee/dashboard.html';
    }

    // logged in hai ya nahi + first login note dikhana hai ya nahi
    API.get('me').then(res => {
      userRole = res.data.role;
      if (Number(res.data.must_change_password) === 1) {
        // pehli login - password badalna zaroori, back ka option nahi
        document.getElementById('firstLoginNote').style.display = 'block';
      } else {
        document.getElementById('backLink').style.display = 'block';
      }
    }).catch(() => { window.location.href = 'index.html'; });

    document.getElementById('backBtn').addEventListener('click', (e) => {
      e.preventDefault();
      window.location.href = dashboardUrl();
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const oldPassword = document.getElementById('oldPassword').value;
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      setFieldError('oldField', 'oldMsg', oldPassword ? '' : 'Current password required');
      setFieldError('newField', 'newMsg',
        !newPassword ? 'New password required' : newPassword.length < 6 ? 'Minimum 6 characters' : '');
      setFieldError('confirmField', 'confirmMsg',
        confirmPassword !== newPassword ? 'Passwords do not match' : '');
      if (!oldPassword || !newPassword || newPassword.length < 6 || confirmPassword !== newPassword) return;

      btn.disabled = true;
      btnText.innerHTML = '<span class="md-spinner"></span>';

      try {
        await API.post('change_password', { old_password: oldPassword, new_password: newPassword });
        toast('Password changed!', false);
        setTimeout(() => { window.location.href = dashboardUrl(); }, 800);
      } catch (err) {
        toast(err.message || 'Could not change password');
        btn.disabled = false;
        btnText.textContent = 'Change Password';
      }
    });
  </script>
</body>
</html>
