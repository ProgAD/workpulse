<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WorkPulse — My Attendance</title>
  <link rel="icon" type="image/svg+xml" href="../assets/images/logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/employee.css">
  <style>
    /* month navigation + stats */
    .att-head { margin-top: 18px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .month-nav { display: flex; align-items: center; gap: 4px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 4px; }
    .month-nav button { padding: 6px; display: flex; border-radius: 6px; color: var(--text-muted); }
    .month-nav button:hover { background: var(--border-light); color: var(--text-main); }
    .month-nav .m-label { font-weight: 600; font-size: 13.5px; padding: 0 10px; min-width: 130px; text-align: center; }

    .stat-chips { display: flex; gap: 10px; flex-wrap: wrap; margin-left: auto; }
    .schip {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 8px 14px;
      display: flex; flex-direction: column;
    }
    .schip .n { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 17px; font-weight: 700; line-height: 1.2; }
    .schip .l { font-size: 11px; color: var(--text-muted); }

    /* table */
    .att-table { margin-top: 16px; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 11px 16px; font-size: 13.5px; white-space: nowrap; }
    th { font-size: 11px; text-transform: uppercase; letter-spacing: .6px; color: var(--text-light); border-bottom: 1px solid var(--border-color); }
    tbody tr { border-bottom: 1px solid var(--border-light); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--bg-body); }
    td.mono, th.num { font-variant-numeric: tabular-nums; }
    .st { font-size: 11.5px; font-weight: 600; padding: 3px 10px; border-radius: var(--radius-full); }
    .st.present { background: var(--green-soft); color: #15803d; }
    .st.half_day { background: #fef9c3; color: #a16207; }
    .st.absent { background: #fee2e2; color: #b91c1c; }
    .st.on_leave { background: var(--primary-light); color: var(--primary-hover); }
    .st.holiday, .st.week_off { background: var(--border-light); color: var(--text-muted); }
    .late-flag { color: var(--amber); font-size: 11px; font-weight: 600; margin-left: 6px; }
    .empty-note { text-align: center; color: var(--text-muted); padding: 40px 16px; font-size: 13.5px; }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="topbar-in">
      <div class="tb-brand" onclick="location.href='dashboard.html'" style="cursor:pointer">
        <img src="../assets/images/logo.svg" alt=""> Workpulse
      </div>
      <nav class="tb-nav">
        <a href="dashboard.html">Dashboard</a>
        <a href="attendance.html" class="active">Attendance</a>
        <a href="profile.html">My Profile</a>
      </nav>
      <div class="tb-right">
        <button class="tb-icon" id="logoutBtn" title="Log out">
          <span class="material-symbols-outlined">logout</span>
        </button>
        <img class="tb-avatar" id="tbAvatar" src="" alt="" onclick="location.href='profile.html'" style="cursor:pointer">
      </div>
    </div>
  </header>

  <main class="wrap">
    <div class="greet">
      <h2>My Attendance</h2>
      <div class="date">Din ke hisab se record — check in, check out aur kaam ke ghante</div>
    </div>

    <div class="att-head">
      <div class="month-nav">
        <button id="prevM" title="Previous month"><span class="material-symbols-outlined">chevron_left</span></button>
        <span class="m-label" id="mLabel">—</span>
        <button id="nextM" title="Next month"><span class="material-symbols-outlined">chevron_right</span></button>
      </div>
      <div class="stat-chips">
        <div class="schip"><span class="n" id="cPresent">0</span><span class="l">Days present</span></div>
        <div class="schip"><span class="n" id="cLeaves">0</span><span class="l">Leaves</span></div>
        <div class="schip"><span class="n" id="cWorking">0</span><span class="l">Total working days</span></div>
      </div>
    </div>

    <section class="card att-table">
      <table>
        <thead>
          <tr><th>Date</th><th>Status</th><th class="num">Check In</th><th class="num">Check Out</th><th class="num">Work Hours</th><th class="num">Extra Hours</th></tr>
        </thead>
        <tbody id="attRows"></tbody>
      </table>
      <div class="empty-note" id="emptyNote" style="display:none">Is mahine ka koi record nahi hai.</div>
    </section>
  </main>

  <script src="../assets/js/api.js"></script>
  <script>
    let cur = new Date();
    cur.setDate(1);
    const FULL_DAY_MINS = 8 * 60;

    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const res = await API.get('me');
        if (Number(res.data.must_change_password) === 1) { location.href = '../change-password.html'; return; }
        document.getElementById('tbAvatar').src =
          'https://ui-avatars.com/api/?background=0D8ABC&color=fff&name=' + encodeURIComponent(res.data.email.split('@')[0]);
      } catch (e) { return; }
      loadMonth();
    });

    document.getElementById('prevM').addEventListener('click', () => { cur.setMonth(cur.getMonth() - 1); loadMonth(); });
    document.getElementById('nextM').addEventListener('click', () => { cur.setMonth(cur.getMonth() + 1); loadMonth(); });

    const fmt2 = n => String(n).padStart(2, '0');
    const hhmm = mins => fmt2(Math.floor(mins / 60)) + ':' + fmt2(mins % 60);
    const t = dt => dt ? dt.slice(11, 16) : '—';

    // mahine ke working days = mon-sat (sunday chhutti)
    function workingDays(y, m) {
      let count = 0;
      const days = new Date(y, m + 1, 0).getDate();
      for (let d = 1; d <= days; d++) {
        if (new Date(y, m, d).getDay() !== 0) count++;
      }
      return count;
    }

    async function loadMonth() {
      const y = cur.getFullYear(), m = cur.getMonth();
      document.getElementById('mLabel').textContent =
        cur.toLocaleDateString('en-IN', { month: 'long', year: 'numeric' });

      const rows = document.getElementById('attRows');
      rows.innerHTML = '<tr><td colspan="6" class="empty-note">Loading...</td></tr>';

      try {
        const res = await API.get('att_mine', { month: m + 1, year: y });
        const days = res.data.days || [];
        const sum = res.data.summary || {};

        document.getElementById('cPresent').textContent = (sum.present || 0) + (sum.half_day ? ' + ' + sum.half_day + '½' : '');
        document.getElementById('cLeaves').textContent = sum.on_leave || 0;
        document.getElementById('cWorking').textContent = workingDays(y, m);

        document.getElementById('emptyNote').style.display = days.length ? 'none' : 'block';
        rows.innerHTML = days.map(d => {
          const wm = d.work_mins || 0;
          const extra = Math.max(0, wm - FULL_DAY_MINS);
          return `<tr>
            <td class="mono">${new Date(d.att_date).toLocaleDateString('en-IN', { day: '2-digit', month: 'short' })}</td>
            <td><span class="st ${d.status}">${d.status.replace('_', ' ')}</span>${Number(d.is_late) ? '<span class="late-flag">late</span>' : ''}</td>
            <td class="mono">${t(d.check_in)}</td>
            <td class="mono">${t(d.check_out)}</td>
            <td class="mono">${wm ? hhmm(wm) : '—'}</td>
            <td class="mono">${extra ? hhmm(extra) : '—'}</td>
          </tr>`;
        }).join('');
      } catch (e) {
        rows.innerHTML = '';
        document.getElementById('emptyNote').style.display = 'block';
      }
    }

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      try { await API.post('logout'); } catch (e) {}
      location.href = '../index.html';
    });
  </script>
</body>
</html>
