<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WorkPulse — My Day</title>
  <link rel="icon" type="image/svg+xml" href="../assets/images/logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/employee.css">
</head>
<body>

  <header class="topbar">
    <div class="topbar-in">
      <div class="tb-brand"><img src="../assets/images/logo.svg" alt=""> Workpulse</div>
      <nav class="tb-nav">
        <a href="dashboard.html" class="active">Dashboard</a>
        <a href="attendance.html">Attendance</a>
        <a href="profile.html">My Profile</a>
      </nav>
      <div class="tb-right">
        <button class="tb-icon" id="notifBtn" title="Notifications">
          <span class="material-symbols-outlined">notifications</span>
          <span class="badge" id="notifBadge" style="display:none">0</span>
        </button>
        <button class="tb-icon" onclick="location.href='../change-password.html'" title="Change password">
          <span class="material-symbols-outlined">key</span>
        </button>
        <button class="tb-icon" id="logoutBtn" title="Log out">
          <span class="material-symbols-outlined">logout</span>
        </button>
        <img class="tb-avatar" id="tbAvatar" src="" alt="" onclick="location.href='profile.html'" style="cursor:pointer">
      </div>
    </div>
  </header>

  <main class="wrap">
    <div class="greet">
      <h2 id="greetName">Hi!</h2>
      <div class="date" id="greetDate"></div>
    </div>

    <!-- aaj ka kaam - live timer jab tak checked in ho -->
    <section class="card today">
      <div class="today-left">
        <span class="pulse-dot" id="pulseDot"></span>
        <div>
          <div class="t-label" id="tLabel">Not checked in yet</div>
          <div class="t-timer mono" id="tTimer">00:00:00</div>
          <div class="t-sub" id="tSub">Ready to start your day?</div>
        </div>
      </div>
      <button class="btn btn-in" id="punchBtn">
        <span class="material-symbols-outlined" style="font-size:19px">login</span> Check In
      </button>
    </section>

    <div class="grid3">
      <!-- profile -->
      <section class="card qcard">
        <div class="q-title">My Profile</div>
        <div class="q-row">
          <img class="q-pic" id="qPic" src="" alt="">
          <div>
            <div class="q-big" id="qName">—</div>
            <div class="q-sub" id="qDesig">—</div>
          </div>
        </div>
        <div class="q-sub mono" id="qCode"></div>
        <a class="q-link" href="profile.html">View profile →</a>
      </section>

      <!-- leave balance -->
      <section class="card qcard">
        <div class="q-title">Leave Balance</div>
        <div id="qLeaves"><div class="q-sub">Loading...</div></div>
        <a class="q-link" href="#" title="Time Off page aa raha hai">Apply for leave →</a>
      </section>

      <!-- notifications -->
      <section class="card qcard">
        <div class="q-head">
          <div class="q-title">Notifications</div>
          <span class="chip gray" id="qNotifCount">0 new</span>
        </div>
        <div id="qNotifList"><div class="q-sub">Loading...</div></div>
      </section>
    </div>
  </main>

  <script src="../assets/js/api.js"></script>
  <script>
    let me = null;
    let punchedIn = false;
    let checkInAt = null;   // Date object
    let tickTimer = null;

    document.addEventListener('DOMContentLoaded', async () => {
      // date line
      document.getElementById('greetDate').textContent =
        new Date().toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

      try {
        const res = await API.get('me');
        if (Number(res.data.must_change_password) === 1) { location.href = '../change-password.html'; return; }
        if (res.data.role === 'admin') { location.href = '../admin/dashboard.html'; return; }
      } catch (e) { return; }

      loadProfile();
      loadToday();
      loadLeaves();
      loadNotifs();
    });

    function avatarUrl(name, photo) {
      return photo || 'https://ui-avatars.com/api/?background=0D8ABC&color=fff&name=' + encodeURIComponent(name || 'W');
    }

    async function loadProfile() {
      try {
        const res = await API.get('me_profile');
        me = res.data;
        const name = ((me.first_name || '') + ' ' + (me.last_name || '')).trim();
        const hr = new Date().getHours();
        const wish = hr < 12 ? 'Good morning' : hr < 17 ? 'Good afternoon' : 'Good evening';
        document.getElementById('greetName').textContent = `${wish}, ${me.first_name}!`;
        document.getElementById('qName').textContent = name;
        document.getElementById('qDesig').textContent = me.designation || 'Employee';
        document.getElementById('qCode').textContent = me.emp_code;
        document.getElementById('qPic').src = avatarUrl(name, me.photo_url);
        document.getElementById('tbAvatar').src = avatarUrl(name, me.photo_url);
      } catch (e) {}
    }

    // ---- punch + live timer ----
    function fmt(n) { return String(n).padStart(2, '0'); }

    function tick() {
      if (!checkInAt) return;
      const s = Math.max(0, Math.floor((Date.now() - checkInAt.getTime()) / 1000));
      document.getElementById('tTimer').textContent =
        fmt(Math.floor(s / 3600)) + ':' + fmt(Math.floor((s % 3600) / 60)) + ':' + fmt(s % 60);
    }

    function setPunchUI() {
      const dot = document.getElementById('pulseDot');
      const btn = document.getElementById('punchBtn');
      clearInterval(tickTimer);

      if (punchedIn) {
        dot.classList.add('in');
        document.getElementById('tLabel').textContent = 'Working since ' + checkInAt.toTimeString().slice(0, 5);
        document.getElementById('tSub').textContent = 'Timer chal raha hai — check out karna mat bhulna';
        btn.className = 'btn btn-out';
        btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:19px">logout</span> Check Out';
        tick();
        tickTimer = setInterval(tick, 1000);
      } else {
        dot.classList.remove('in');
        document.getElementById('tLabel').textContent = 'Not checked in yet';
        document.getElementById('tSub').textContent = 'Ready to start your day?';
        btn.className = 'btn btn-in';
        btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:19px">login</span> Check In';
      }
    }

    async function loadToday() {
      try {
        const res = await API.get('att_today');
        const att = res.data && res.data.attendance;
        if (att && att.check_in && !att.check_out) {
          punchedIn = true;
          checkInAt = new Date(att.check_in.replace(' ', 'T'));
          setPunchUI();
        } else if (att && att.check_out) {
          // aaj ka din poora ho gaya
          const mins = att.work_mins || 0;
          document.getElementById('tTimer').textContent = fmt(Math.floor(mins / 60)) + ':' + fmt(mins % 60) + ':00';
          document.getElementById('tLabel').textContent = 'Done for today';
          document.getElementById('tSub').textContent = 'Checked out at ' + att.check_out.slice(11, 16);
          const btn = document.getElementById('punchBtn');
          btn.disabled = true;
          btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:19px">task_alt</span> Day complete';
        } else {
          setPunchUI();
        }
      } catch (e) {}
    }

    document.getElementById('punchBtn').addEventListener('click', async () => {
      const btn = document.getElementById('punchBtn');
      btn.disabled = true;
      try {
        if (!punchedIn) {
          const res = await API.post('punch_in');
          punchedIn = true;
          checkInAt = res.data && res.data.check_in ? new Date(res.data.check_in.replace(' ', 'T')) : new Date();
          setPunchUI();
        } else {
          await API.post('punch_out');
          punchedIn = false;
          checkInAt = null;
          clearInterval(tickTimer);
          document.getElementById('pulseDot').classList.remove('in');
          loadToday();   // done-for-today state yahi set karega
        }
      } catch (err) {
        alert(err.message || 'Punch nahi hua');
      } finally { btn.disabled = false; }
    });

    // ---- leave balance ----
    async function loadLeaves() {
      const box = document.getElementById('qLeaves');
      try {
        const res = await API.get('leave_balances');
        const rows = (res.data && res.data.balances) || [];
        if (!rows.length) { box.innerHTML = '<div class="q-sub">Koi leave type set nahi hai</div>'; return; }
        box.innerHTML = rows.map(b => {
          const total = b.annual_quota != null ? parseFloat(b.annual_quota) : null;
          const used = parseFloat(b.used || 0);
          const left = total != null ? (total - used) : null;
          return `<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px">
              <span>${b.name}</span>
              <b>${left != null ? left + ' left' : 'No limit'}</b>
            </div>`;
        }).join('');
      } catch (e) { box.innerHTML = '<div class="q-sub">Load nahi hua</div>'; }
    }

    // ---- notifications ----
    async function loadNotifs() {
      const list = document.getElementById('qNotifList');
      try {
        const res = await API.get('notifications', { limit: 4 });
        const d = res.data || {};
        const items = d.items || [];
        const badge = document.getElementById('notifBadge');
        if (d.unread > 0) { badge.style.display = 'flex'; badge.textContent = d.unread; }
        document.getElementById('qNotifCount').textContent = (d.unread || 0) + ' new';
        document.getElementById('qNotifCount').className = 'chip ' + (d.unread > 0 ? 'green' : 'gray');
        if (!items.length) { list.innerHTML = '<div class="q-sub">Sab clear hai 🎉</div>'; return; }
        list.innerHTML = items.map(n =>
          `<div style="padding:5px 0; border-bottom:1px solid var(--border-light); ${n.read_at ? 'opacity:.55' : ''}">
             <div style="font-size:13px; font-weight:600">${n.title}</div>
             <div class="q-sub">${n.body || ''}</div>
           </div>`).join('');
      } catch (e) { list.innerHTML = '<div class="q-sub">Load nahi hua</div>'; }
    }

    // bell dabao to sab read
    document.getElementById('notifBtn').addEventListener('click', async () => {
      try { await API.post('notif_read', { all: true }); loadNotifs(); } catch (e) {}
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      try { await API.post('logout'); } catch (e) {}
      location.href = '../index.html';
    });
  </script>
</body>
</html>
