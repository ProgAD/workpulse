<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WorkPulse — Admin</title>
  <link rel="icon" type="image/svg+xml" href="../assests/images/logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="../assests/css/app.css">
  <style>
    /* app bar + content layout */
    .appbar {
      background: var(--md-primary);
      color: #fff;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      box-shadow: var(--md-shadow-2);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .appbar img { width: 30px; height: 30px; }
    .appbar h1 { font-size: 18px; font-weight: 500; flex: 1; }
    .appbar .who { font-size: 13px; opacity: .85; margin-right: 6px; }
    .icon-btn {
      border: none; background: none; color: inherit; cursor: pointer;
      padding: 8px; border-radius: 50%; display: flex;
    }
    .icon-btn:hover { background: rgba(255,255,255,.15); }

    .content { max-width: 1000px; margin: 24px auto; padding: 0 16px; }
    .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .section-head h2 { font-size: 20px; font-weight: 500; }

    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 12px 14px; font-size: 14px; }
    th { color: var(--md-text-2); font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid #e0e0e0; }
    tbody tr { border-bottom: 1px solid #f0f0f0; }
    tbody tr:hover { background: #fafafa; }
    .chip { font-size: 12px; padding: 3px 10px; border-radius: 12px; font-weight: 500; }
    .chip.active { background: #e6f4ea; color: #137333; }
    .chip.suspended { background: #fef7e0; color: #b06000; }
    .chip.exited { background: #fce8e6; color: #c5221f; }
    .code { font-family: monospace; font-size: 13px; }

    /* modal */
    .modal-back {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      display: none; align-items: center; justify-content: center; z-index: 100; padding: 16px;
    }
    .modal-back.open { display: flex; }
    .modal { max-width: 420px; width: 100%; }
    .modal h3 { font-size: 18px; font-weight: 500; margin-bottom: 20px; }

    /* naya employee banne ke baad wala credentials box */
    .cred-box {
      background: var(--md-primary-light);
      border-radius: 8px;
      padding: 16px;
      margin: 14px 0;
      font-family: monospace;
      font-size: 15px;
    }
    .cred-box div { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; }
    .cred-warn { font-size: 12px; color: var(--md-error); margin-bottom: 6px; }
    .empty-note { text-align: center; color: var(--md-text-2); padding: 32px; font-size: 14px; }
  </style>
</head>
<body>

  <div class="appbar">
    <img src="../assests/images/logo.svg" alt="">
    <h1>WorkPulse Admin</h1>
    <span class="who" id="whoami"></span>
    <button class="icon-btn" id="logoutBtn" title="Logout"><span class="material-icons">logout</span></button>
  </div>

  <div class="content">
    <div class="section-head">
      <h2>Employees</h2>
      <button class="md-btn md-btn-primary" id="addBtn">
        <span class="material-icons" style="font-size:18px">person_add</span> Add Employee
      </button>
    </div>

    <div class="md-card" style="padding:0; overflow-x:auto">
      <table>
        <thead>
          <tr><th>Login ID</th><th>Name</th><th>Email</th><th>Phone</th><th>DOJ</th><th>Status</th><th></th></tr>
        </thead>
        <tbody id="empRows"></tbody>
      </table>
      <div class="empty-note" id="emptyNote" style="display:none">Abhi koi employee nahi. "Add Employee" se shuru karo.</div>
    </div>
  </div>

  <!-- add employee modal -->
  <div class="modal-back" id="addModal">
    <div class="md-card modal">
      <h3>Add Employee</h3>
      <form id="addForm" novalidate>
        <div class="md-field" id="nameField">
          <input type="text" id="empName" placeholder=" " required>
          <label for="empName">Full Name</label>
          <div class="field-msg" id="nameMsg"></div>
        </div>
        <div class="md-field" id="emailField">
          <input type="email" id="empEmail" placeholder=" " required>
          <label for="empEmail">Email</label>
          <div class="field-msg" id="emailMsg"></div>
        </div>
        <div class="md-field" id="phoneField">
          <input type="tel" id="empPhone" placeholder=" " maxlength="10" required>
          <label for="empPhone">Phone</label>
          <div class="field-msg" id="phoneMsg"></div>
        </div>
        <div class="md-field">
          <input type="date" id="empDoj">
          <label for="empDoj" style="top:-8px;font-size:12px">Date of Joining</label>
        </div>
        <div style="display:flex; gap:10px; justify-content:flex-end">
          <button type="button" class="md-btn" id="cancelAdd" style="background:#eee">Cancel</button>
          <button type="submit" class="md-btn md-btn-primary" id="saveBtn"><span id="saveText">Create</span></button>
        </div>
      </form>
    </div>
  </div>

  <!-- credentials modal, create ke baad ek hi baar dikhta hai -->
  <div class="modal-back" id="credModal">
    <div class="md-card modal">
      <h3>Employee Created 🎉</h3>
      <p class="cred-warn">Ye password dobara nahi dikhega — abhi copy karke employee ko de do.</p>
      <div class="cred-box">
        <div><span>Login ID</span> <b id="credId"></b></div>
        <div><span>Password</span> <b id="credPass"></b></div>
      </div>
      <div style="display:flex; gap:10px; justify-content:flex-end">
        <button class="md-btn" id="copyCred" style="background:#eee">
          <span class="material-icons" style="font-size:18px">content_copy</span> Copy
        </button>
        <button class="md-btn md-btn-primary" id="credDone">Done</button>
      </div>
    </div>
  </div>

  <div class="md-snackbar" id="snackbar"></div>

  <script src="../assests/js/api.js"></script>
  <script>
    const snackbar = document.getElementById('snackbar');
    let snackTimer;
    function toast(msg, isError = true) {
      clearTimeout(snackTimer);
      snackbar.textContent = msg;
      snackbar.className = 'md-snackbar show' + (isError ? ' error' : '');
      snackTimer = setTimeout(() => snackbar.classList.remove('show'), 4000);
    }
    function setFieldError(fieldId, msgId, msg) {
      document.getElementById(fieldId).classList.toggle('has-error', !!msg);
      document.getElementById(msgId).textContent = msg || '';
    }
    const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

    // sirf admin ke liye hai ye page
    API.get('me').then(res => {
      if (res.data.role !== 'admin') { window.location.href = '../employee/dashboard.html'; return; }
      if (Number(res.data.must_change_password) === 1) { window.location.href = '../change-password.html'; return; }
      document.getElementById('whoami').textContent = res.data.email;
      loadEmployees();
    }).catch(() => {});

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      try { await API.post('logout'); } catch (e) {}
      window.location.href = '../index.html';
    });

    async function loadEmployees() {
      const rows = document.getElementById('empRows');
      try {
        const res = await API.get('employees');
        const list = res.data || [];
        document.getElementById('emptyNote').style.display = list.length ? 'none' : 'block';
        rows.innerHTML = list.map(e => `
          <tr>
            <td class="code">${esc(e.emp_code)}</td>
            <td>${esc(e.first_name)} ${esc(e.last_name || '')}</td>
            <td>${esc(e.email)}</td>
            <td>${esc(e.phone || '-')}</td>
            <td>${esc(e.doj || '-')}</td>
            <td><span class="chip ${esc(e.status)}">${esc(e.status)}</span></td>
            <td>${e.role === 'admin' ? '' : `
              <button class="icon-btn" style="color:var(--md-error)" title="Remove" onclick="removeEmp(${e.id})">
                <span class="material-icons" style="font-size:19px">delete</span>
              </button>`}
            </td>
          </tr>`).join('');
      } catch (err) {
        toast(err.message);
      }
    }

    async function removeEmp(id) {
      if (!confirm('Is employee ko remove karna hai?')) return;
      try {
        await API.post('employee_remove/' + id);
        toast('Employee removed', false);
        loadEmployees();
      } catch (err) { toast(err.message); }
    }

    // add modal kholna/band karna
    const addModal = document.getElementById('addModal');
    document.getElementById('addBtn').addEventListener('click', () => addModal.classList.add('open'));
    document.getElementById('cancelAdd').addEventListener('click', () => addModal.classList.remove('open'));

    document.getElementById('addForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('empName').value.trim();
      const email = document.getElementById('empEmail').value.trim();
      const phone = document.getElementById('empPhone').value.trim();
      const doj = document.getElementById('empDoj').value;

      setFieldError('nameField', 'nameMsg', name ? '' : 'Name required');
      setFieldError('emailField', 'emailMsg', email ? '' : 'Email required');
      setFieldError('phoneField', 'phoneMsg',
        !phone ? 'Phone required' : !/^\d{10}$/.test(phone) ? '10 digit number' : '');
      if (!name || !email || !/^\d{10}$/.test(phone)) return;

      const saveBtn = document.getElementById('saveBtn');
      saveBtn.disabled = true;
      document.getElementById('saveText').innerHTML = '<span class="md-spinner"></span>';

      try {
        const res = await API.post('employee_create', { name, email, phone, doj });
        addModal.classList.remove('open');
        document.getElementById('addForm').reset();
        // credentials ek hi baar dikhte hai, isi modal me
        document.getElementById('credId').textContent = res.data.login_id;
        document.getElementById('credPass').textContent = res.data.temp_password;
        document.getElementById('credModal').classList.add('open');
        loadEmployees();
      } catch (err) {
        toast(err.message);
      } finally {
        saveBtn.disabled = false;
        document.getElementById('saveText').textContent = 'Create';
      }
    });

    document.getElementById('copyCred').addEventListener('click', () => {
      const txt = 'Login ID: ' + document.getElementById('credId').textContent
        + '\nPassword: ' + document.getElementById('credPass').textContent
        + '\nLogin: ' + location.origin + '/workpulse/';
      navigator.clipboard.writeText(txt).then(() => toast('Copied!', false));
    });
    document.getElementById('credDone').addEventListener('click', () => {
      document.getElementById('credModal').classList.remove('open');
    });
  </script>
</body>
</html>
