<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Notifications - Workpulse</title>
<link rel="icon" type="image/svg+xml" href="../assets/images/logo.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../assets/css/admin.css?v=2"/>
</head>
<body>
<div class="app">

  <div id="sidebarBackdrop" class="sidebar-backdrop"></div>
  <aside id="sidebar" class="sidebar">
    <div class="brand">
      <img src="../assets/images/logo.svg" alt="" class="brand-logo"/>
      <div><h1 class="brand-name">Workpulse</h1><p class="brand-sub">Management Portal</p></div>
    </div>
    <nav class="nav">
      <a class="nav-link" href="dashboard.html"><span class="material-symbols-outlined">dashboard</span><span>Dashboard</span></a>
      <a class="nav-link" href="employees.html"><span class="material-symbols-outlined">groups</span><span>Employees</span></a>
      <a class="nav-link" href="attendance.html"><span class="material-symbols-outlined">calendar_month</span><span>Attendance</span></a>
      <a class="nav-link" href="timeoff.html"><span class="material-symbols-outlined">event_busy</span><span>Time Off</span></a>
      <a class="nav-link" href="payroll.html"><span class="material-symbols-outlined">payments</span><span>Payroll</span></a>
    </nav>
    <div class="side-user">
      <a href="profile.html" class="side-user-link">
        <img id="sideAvatar" class="side-user-avatar" src="https://ui-avatars.com/api/?name=Admin&background=0D8ABC&color=fff" alt=""/>
        <div class="side-user-info"><p id="sideName" class="side-user-name">Admin</p><p class="side-user-role">Administrator</p></div>
      </a>
      <button onclick="logout()" class="side-logout" title="Log out"><span class="material-symbols-outlined">logout</span></button>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="topbar-left">
        <button id="menuBtn" class="menu-btn"><span class="material-symbols-outlined">menu</span></button>
        <h2 class="page-title hide-sm">Notifications</h2>
      </div>
      <div class="topbar-right">
        <div class="notif-wrap">
          <button id="bellBtn" class="icon-btn">
            <span class="material-symbols-outlined">notifications</span>
            <span id="notifDot" class="notif-dot hidden"></span>
          </button>
          <div id="notifPopup" class="notif-popup hidden">
            <div class="notif-popup-head"><span class="ttl">Notifications</span><span id="notifPopupCount" class="count"></span></div>
            <div id="notifPopupList" class="notif-popup-list"></div>
            <a href="notifications.html" class="notif-popup-foot">View all notifications</a>
          </div>
        </div>
      </div>
    </header>

    <div class="content custom-scrollbar">

      <section class="card">
        <div class="card-head">
          <div class="tabs" id="filterTabs">
            <button class="tab active" data-filter="all">All</button>
            <button class="tab" data-filter="unread">Unread <span id="unreadCount"></span></button>
          </div>
          <button id="markAllBtn" onclick="markAllRead()" class="btn btn-outline"><span class="material-symbols-outlined">done_all</span> Mark all read</button>
        </div>
        <div id="notifList" class="notif-list"></div>
        <div id="loadingState" class="state-box hidden"><span class="material-symbols-outlined spin">progress_activity</span><p>Loading...</p></div>
        <div id="emptyState" class="state-box hidden"><span class="material-symbols-outlined">notifications_off</span><h3>No notifications</h3><p>You're all caught up.</p></div>
      </section>
    </div>
  </main>
</div>

<script src="../assets/js/api.js"></script>
<script>
    Object.assign(API._endpointMap, {
        'notifications': 'notifications/index.php',
        'notif_read':    'notifications/index.php?action=mark_read',
    });

    let items = [];
    let filterMode = 'all';

    document.addEventListener('DOMContentLoaded', async () => {
        initSidebar();
        initNotifBell();
        document.querySelectorAll('#filterTabs .tab').forEach(t => {
            t.addEventListener('click', () => {
                document.querySelectorAll('#filterTabs .tab').forEach(x => x.classList.remove('active'));
                t.classList.add('active');
                filterMode = t.dataset.filter;
                render();
            });
        });
        try {
            const res = await API.get('me');
            const u = res.data;
            if (Number(u.must_change_password) === 1) { window.location.href = '../change-password.html'; return; }
            if (u.role !== 'admin') { window.location.href = '../employee/dashboard.html'; return; }
            const name = u.email.split('@')[0];
            document.getElementById('sideName').innerText = name;
            document.getElementById('sideAvatar').src = 'https://ui-avatars.com/api/?background=0D8ABC&color=fff&name=' + encodeURIComponent(name);
        } catch (e) {}
        loadNotifications();
    });

    function initSidebar() {
        const sb = document.getElementById('sidebar'), bd = document.getElementById('sidebarBackdrop'), menu = document.getElementById('menuBtn');
        menu.addEventListener('click', () => { sb.classList.add('open'); bd.classList.add('show'); });
        bd.addEventListener('click', () => { sb.classList.remove('open'); bd.classList.remove('show'); });
    }
    function initNotifBell() {
        const btn = document.getElementById('bellBtn');
        const pop = document.getElementById('notifPopup');
        if (!btn) return;
        btn.addEventListener('click', (e) => { e.stopPropagation(); pop.classList.toggle('hidden'); });
        document.addEventListener('click', (e) => { if (!btn.contains(e.target) && !pop.contains(e.target)) pop.classList.add('hidden'); });
        loadBellNotifications();
    }
    function bellTimeAgo(ts) {
        if (!ts) return '';
        const then = new Date(ts.replace(' ', 'T'));
        const diff = (Date.now() - then.getTime()) / 1000;
        if (diff < 60) return 'just now';
        if (diff < 3600) return Math.floor(diff / 60) + ' min ago';
        if (diff < 86400) return Math.floor(diff / 3600) + ' hours ago';
        if (diff < 172800) return 'Yesterday';
        return then.toLocaleDateString();
    }
    function bellIcon(type) {
        if (type === 'leave') return { i: 'event_busy', c: '' };
        if (type === 'regularization') return { i: 'edit_calendar', c: 'tert' };
        if (type === 'payslip') return { i: 'payments', c: 'green' };
        return { i: 'notifications', c: '' };
    }
    async function loadBellNotifications() {
        try {
            const res = await API.get('notifications', { limit: 10 });
            const unread = ((res.data && res.data.items) || []).filter(n => !n.read_at);
            document.getElementById('notifDot').classList.toggle('hidden', unread.length === 0);
            document.getElementById('notifPopupCount').innerText = unread.length ? unread.length + ' unread' : '';
            const list = document.getElementById('notifPopupList');
            const rows = unread.slice(0, 6);
            if (rows.length === 0) { list.innerHTML = '<div class="notif-popup-empty">You\'re all caught up 🎉</div>'; return; }
            list.innerHTML = rows.map(n => {
                const ic = bellIcon(n.type);
                return `<div class="np-item"><div class="notif-icon ${ic.c}"><span class="material-symbols-outlined">${ic.i}</span></div><div class="np-main"><div class="np-title">${n.title || ''}</div>${n.body ? `<div class="np-text">${n.body}</div>` : ''}<div class="np-time">${bellTimeAgo(n.created_at)}</div></div></div>`;
            }).join('');
        } catch (e) {
            const l = document.getElementById('notifPopupList');
            if (l) l.innerHTML = '<div class="notif-popup-empty">No notifications</div>';
        }
    }
    async function logout() { try { await API.post('logout'); } catch (e) {} window.location.href = '../index.html'; }

    function timeAgo(ts) {
        if (!ts) return '';
        const then = new Date(ts.replace(' ', 'T'));
        const diff = (Date.now() - then.getTime()) / 1000;
        if (diff < 60) return 'just now';
        if (diff < 3600) return Math.floor(diff / 60) + ' min ago';
        if (diff < 86400) return Math.floor(diff / 3600) + ' hours ago';
        if (diff < 172800) return 'Yesterday';
        return then.toLocaleString();
    }
    function iconFor(type) {
        if (type === 'leave') return { i: 'event_busy', c: '' };
        if (type === 'regularization') return { i: 'edit_calendar', c: 'tert' };
        if (type === 'payslip') return { i: 'payments', c: 'green' };
        return { i: 'notifications', c: '' };
    }

    async function loadNotifications() {
        const loader = document.getElementById('loadingState');
        document.getElementById('notifList').innerHTML = '';
        document.getElementById('emptyState').classList.add('hidden');
        loader.classList.remove('hidden');
        try {
            const res = await API.get('notifications', { limit: 50 });
            const data = res.data || {};
            items = data.items || [];
            const unread = data.unread || 0;
            document.getElementById('unreadCount').innerText = unread ? `(${unread})` : '';
            render();
        } catch (err) {
            console.error('Notifications load failed:', err.message);
            items = []; render();
        } finally { loader.classList.add('hidden'); }
    }

    function render() {
        const list = document.getElementById('notifList');
        const empty = document.getElementById('emptyState');
        const rows = filterMode === 'unread' ? items.filter(n => !n.read_at) : items;
        list.innerHTML = '';
        if (rows.length === 0) { empty.classList.remove('hidden'); return; }
        empty.classList.add('hidden');
        rows.forEach(n => {
            const ic = iconFor(n.type);
            const unread = !n.read_at;
            const div = document.createElement('div');
            div.className = 'notif-item' + (unread ? ' unread' : '');
            div.onclick = () => { if (unread) markRead(n.id); };
            div.innerHTML = `
                <div class="notif-icon ${ic.c}"><span class="material-symbols-outlined">${ic.i}</span></div>
                <div class="notif-main">
                    <div class="notif-title">${n.title || ''}</div>
                    ${n.body ? `<div class="notif-text">${n.body}</div>` : ''}
                    <div class="notif-time">${timeAgo(n.created_at)}</div>
                </div>
                ${unread ? '<div class="notif-unread-dot"></div>' : ''}`;
            list.appendChild(div);
        });
    }

    async function markRead(id) {
        const n = items.find(x => x.id === id);
        if (n) n.read_at = new Date().toISOString();   // optimistic
        render();
        recalcUnread();
        try { await API.post('notif_read', { id }); } catch (e) { /* wapas load kar lenge next time */ }
    }
    async function markAllRead() {
        const btn = document.getElementById('markAllBtn');
        btn.disabled = true;
        try {
            await API.post('notif_read', { all: true });
            items.forEach(n => { if (!n.read_at) n.read_at = new Date().toISOString(); });
            recalcUnread(); render();
        } catch (e) { alert(e.message || 'Could not mark all read'); }
        finally { btn.disabled = false; }
    }
    function recalcUnread() {
        const unread = items.filter(n => !n.read_at).length;
        document.getElementById('unreadCount').innerText = unread ? `(${unread})` : '';
    }
</script>
</body>
</html>
